source HOUNDXADS_models : HOUNDXADS
{
#
	sql_query = \
		SELECT model.id_model AS id_model, model.id_model AS model_id, model.name, crc32(model.name) as name_crc,  model.classic AS classic, \
			(  \
				SELECT concat(concat('_pseudo', replace(group_concat(model_names.model_id), ',', ' _pseudo'), ' '), replace(group_concat(model_names.name), ',', ' '))  \
				FROM model_names AS model_names  \
				WHERE model_names.model_id = model.id_model  \
			) AS `model_names`  \
			FROM model

	#sql_query_range = SELECT MIN(gal_id),MAX(gal_id) FROM galleries
	#sql_range_step = 1000

	sql_attr_uint = model_id
	sql_attr_uint = classic
	sql_attr_uint = name_crc

	sql_attr_multi = uint site from query; SELECT model_gallery.model_id, sites_galleries.site_id FROM model_gallery LEFT JOIN sites_galleries ON model_gallery.gallery_id = sites_galleries.gal_id

	# EYES COLOR: none - 0,  amber - 1,blue - 2,brown - 3,gray -4,green - 5, hazel -6
	sql_attr_multi = uint eyes_color from query; SELECT id_model, (CASE eyes WHEN 'none' THEN 0 WHEN 'amber' THEN 1 WHEN 'blue' THEN 2 WHEN 'brown' THEN 3 WHEN '	' THEN 4 WHEN 'green' THEN 5 WHEN 'hazel' THEN 6 END) AS eyes_color FROM model

	# Ethnic: 'none' = 0,'arab'=1,'american'=2,'euro'=3,'ebony'=4,'asian'=5,'latin'=6,'indian'=7
	sql_attr_multi = uint ethnic from query; SELECT id_model, (CASE ethnic WHEN 'none' THEN 0 WHEN 'arab' THEN 1 WHEN 'american' THEN 2 WHEN 'euro' THEN 3 WHEN 'ebony' THEN 4 WHEN 'asian' THEN 5 WHEN 'latin' THEN 6 WHEN 'indian' THEN 7 END) AS eyes FROM model

	# Hair color: 'bald' 0 ,'blond' -1,'brown' -2,'brunette' -3,'gray'-4,'red' -5,'white' -6
	sql_attr_multi = uint hair_color from query; SELECT id_model, (CASE hair WHEN 'bald' THEN 0 WHEN 'blond' THEN 1 WHEN 'brown' THEN 2 WHEN 'brunette' THEN 3 WHEN 'gray' THEN 4 WHEN 'red' THEN 5 WHEN 'white' THEN 6 END) AS hair_color FROM model

	# Body type: 'none' -0,'skinny'-1,'thin'-2,'slim'-3,'athletic'-4,'muscular'-5,'bodybuilder'-6,'chubby'-7,'fat'-8
	sql_attr_multi = uint body_type from query; SELECT id_model, (CASE eyes WHEN 'none' THEN 0 WHEN 'skinny' THEN 1 WHEN 'thin' THEN 2 WHEN 'slim' THEN 3 WHEN 'athletic' THEN 4 WHEN 'muscular' THEN 5 WHEN 'bodybuilder' THEN 6 WHEN 'chubby' THEN 7 WHEN 'fat' THEN 8 END) AS body_type FROM model

	# Piercing: 'none' - 0,'yes' - 1,'no' - -1
	sql_attr_multi = uint got_piercing from query; SELECT id_model, (CASE piercing WHEN 'none' THEN 0 WHEN 'yes' THEN 1 WHEN 'no' THEN -1 END) AS got_piercing FROM model

	# Tattoo: none - 0,  amber - 1,blue - 2,brown - 3,gray -4,green - 5, hazel -6
	sql_attr_multi = uint got_tattoo from query; SELECT id_model, (CASE tattoo WHEN 'none' THEN 0 WHEN 'yes' THEN 1 WHEN 'no' THEN -1 END) AS got_tattoo FROM model

	# Cock n boobs type (cut/uncut, fake/natural): none - 0,  natural - 1,mod - -1
	sql_attr_multi = uint cock_n_boobs_mod_type from query; SELECT id_model, (CASE cock_n_boobs_type WHEN 'none' THEN 0 WHEN 'yes' THEN 1 WHEN 'no' THEN -1 END) AS cock_n_boobs_mod_type FROM model


	# Active/not (cut/uncut, fake/natural): yes - 1,  no - 0
	sql_attr_multi = uint is_active from query; SELECT id_model, (CASE active WHEN 'no' THEN 0 WHEN 'yes' THEN 1 END) AS is_active FROM model

	# Sex (male/female/shemale) : female - 0,  male - 1,shemale - 2
	sql_attr_multi = uint sex from query; SELECT id_model, (CASE sex WHEN 'female' THEN 0 WHEN 'male' THEN 1 WHEN 'shemale' THEN 2 END) AS sex FROM model
	sql_ranged_throttle = 0
}

