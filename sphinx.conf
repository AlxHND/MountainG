source TUBER_galleries : TUBER
{
	#
	sql_query = \
		SELECT \
			gallery.id AS gal_id, \
			gallery.title AS gal_title, \
			'Movies' AS gal_type, \
			gallery.niche as gal_niche, \
			gallery.tube AS gal_paysite, \
			gallery.status AS gal_status, \
			gallery.date_added AS gal_added, \
			( \
				SELECT concat(concat('_tag', replace(group_concat(tag_names.id), ',', ' _tag'), ' '), replace(group_concat(tag_names.name), ',', ' ')) \
				FROM tag_names \
				JOIN tags AS galleries_tags ON (tag_names.id = galleries_tags.tag_id) \
				WHERE galleries_tags.gal_id = gallery.id \
			) AS `tags_names`, \
			'1' AS `gallery_sites` \
		FROM galleries AS gallery \
		WHERE gallery.status = 'ok' \

	#
	#sql_query_range = SELECT MIN(gal_id),MAX(gal_id) FROM galleries
	#sql_range_step = 1000

	sql_attr_uint = gal_paysite
	sql_attr_uint = gal_added
	sql_attr_multi = uint tag from query; SELECT tags.gal_id, tags.tag_id FROM tags
	sql_attr_multi = uint site from query; SELECT id, '1' AS site_id FROM galleries
	sql_attr_multi = uint random_number from query; SELECT id, random_number FROM galleries
	sql_attr_multi = uint time_added from query; SELECT id, date_added FROM galleries

	#embed - 1, movies - 2, pics - 3
	sql_attr_multi = uint type from query; SELECT galleries.id, 'Movies' AS gal_type FROM galleries

	#gay - 1, shemale - 2, staight - 3
	sql_attr_multi = uint niche from query; SELECT id, (CASE niche WHEN 'gay' THEN 1 WHEN 'shemale' THEN 2 WHEN 'straight' THEN 3 END) AS gal_niche FROM galleries
	sql_ranged_throttle = 0
}



source SKEETADS_galleries : SKEETADS
{
	#
	sql_query = \
		SELECT \
			gallery.gal_id, \
			gallery.gal_title, \
			gallery.gal_type, \
			gallery.gal_niche, \
			gallery.gal_paysite, \
			gallery.gal_status, \
			UNIX_TIMESTAMP(gallery.gal_added) AS gal_added, \
			( \
					SELECT concat(concat('_tag', replace(group_concat(tags.tag_id), ',', ' _tag'), ' '), replace(group_concat(tags.tag_name), ',', ' ')) \
					FROM tags AS tags \
					JOIN galleries_tags AS galleries_tags ON (tags.tag_id = galleries_tags.gal_tags) \
					WHERE galleries_tags.gal_id = gallery.gal_id \
			) AS `tags_names`, \
			( \
				SELECT concat(concat('_model', replace(group_concat(model.id_model), ',', ' _model'), ' '), replace(group_concat(model.name), ',', ' ')) \
				FROM model AS model \
				JOIN model_gallery AS model_gallery ON (model.id_model = model_gallery.model_id) \
				WHERE model_gallery.gallery_id = gallery.gal_id \
			) AS `models_names`, \
			( \
				SELECT concat('_site', replace(group_concat(sites_galleries.site_id), ',', ' _site'), ' ') \
				FROM sites_galleries AS sites_galleries \
				WHERE sites_galleries.gal_id = gallery.gal_id \
			) AS `gallery_sites` \
		FROM galleries AS gallery \
		WHERE gallery.gal_status = 'OK' \

	#
	#sql_query_range = SELECT MIN(gal_id),MAX(gal_id) FROM galleries
	#sql_range_step = 1000

	sql_attr_uint = gal_paysite
	sql_attr_timestamp = gal_added
	sql_attr_multi = uint tag from query; SELECT galleries_tags.gal_id, galleries_tags.gal_tags FROM galleries_tags
	sql_attr_multi = uint model from query; SELECT model_gallery.gallery_id, model_gallery.model_id FROM model_gallery
	sql_attr_multi = uint site from query; SELECT gal_id, site_id FROM sites_galleries
	sql_attr_multi = uint random_number from query; SELECT gal_id, random_number FROM sites_galleries
	sql_attr_multi = uint time_added from query; SELECT gal_id, time_added FROM sites_galleries

	#embed - 1, movies - 2, pics - 3
	sql_attr_multi = uint type from query; SELECT galleries.gal_id, (CASE gal_type WHEN 'Embed' THEN 1 WHEN 'Movies' THEN 2 WHEN 'Pics' THEN 3 END) AS gal_type FROM galleries

	#gay - 1, shemale - 2, staight - 3
	sql_attr_multi = uint niche from query; SELECT gal_id, (CASE gal_niche WHEN 'Gay' THEN 1 WHEN 'Shemale' THEN 2 WHEN 'Straight' THEN 3 END) AS gal_niche FROM galleries
	sql_ranged_throttle = 0
}

